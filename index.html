<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0b17" />
    <meta name="color-scheme" content="dark" />

    <title>JLPT RPG - 일본어 학습 모험</title>
    <meta
      name="description"
      content="한자 던전을 탐험하며 단어를 외우고 몬스터를 처치하는 JLPT 학습 RPG."
    />

    <!--
      파비콘 & 앱 아이콘 (모두 PixelSword 디자인).
      ?v=2 는 브라우저 favicon 캐시 무효화용 - 디자인을 손볼 때마다 숫자를 올린다.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <link rel="mask-icon" href="/favicon.svg?v=3" color="#33c4ff" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg?v=3" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (카카오톡 / 페이스북 / 디스코드 / 라인 공유 미리보기) -->
    <!--
      카카오톡/페이스북 크롤러는 SVG OG 이미지를 무시하고 og:image 가
      상대 경로일 경우 캐시에 실패할 수 있어 절대 URL(PNG)을 사용한다.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JLPT RPG" />
    <meta property="og:title" content="JLPT RPG - 일본어 학습 모험" />
    <meta
      property="og:description"
      content="漢字ダンジョン. 단어를 외우고 몬스터를 처치하라."
    />
    <meta property="og:url" content="https://jlpt-rpg.vercel.app/" />
    <meta property="og:image" content="https://jlpt-rpg.vercel.app/og-image.png" />
    <meta
      property="og:image:secure_url"
      content="https://jlpt-rpg.vercel.app/og-image.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="JLPT RPG - 한자 던전과 빛나는 룬 검 픽셀 아트"
    />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:locale:alternate" content="ja_JP" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JLPT RPG - 일본어 학습 모험" />
    <meta
      name="twitter:description"
      content="漢字ダンジョン. 단어를 외우고 몬스터를 처치하라."
    />
    <meta
      name="twitter:image"
      content="https://jlpt-rpg.vercel.app/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="JLPT RPG - 한자 던전과 빛나는 룬 검 픽셀 아트"
    />
  </head>
  <body class="bg-dungeon-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
